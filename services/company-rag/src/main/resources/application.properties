quarkus.http.port=8084
%dev.quarkus.http.port=8084
quarkus.application.name=company-internal-documents-rag
quarkus.log.level=INFO

# Open API and Swagger UI config
quarkus.smallrye-openapi.info-title=Company Internal Documents API
%dev.quarkus.smallrye-openapi.info-title=Company Internal Documents API (development)
quarkus.smallrye-openapi.info-version=1.0.1
quarkus.smallrye-openapi.info-license-name=Apache 2.0
quarkus.smallrye-openapi.info-license-url=https://www.apache.org/licenses/LICENSE-2.0.html
quarkus.swagger-ui.enabled=true

# Quarkus LangChain4J OpenAI Configuration (automatic EmbeddingModel bean)
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:}
quarkus.langchain4j.openai.embedding-model.model-name=text-embedding-3-large

quarkus.datasource.db-kind=oracle
quarkus.datasource.jdbc.driver=oracle.jdbc.driver.OracleDriver
quarkus.datasource.jdbc.url=jdbc:oracle:thin:@localhost:1522/freepdb1
quarkus.datasource.username=vector
quarkus.datasource.password=vector
oracleai.embedding.table.name=document
oracleai.embedding.metadata.column=metadata

# Data to load on init
demo.data.load=true
sync-demo-data=false
demo.config.split.location=classpath:/config/document_splitting_rule.yaml
demo.dir.location=company-documents
# Access policy: writable file
demo.config.access.path=${demo.dir.location}/config/document_access_policy.yaml


# Document Chunking Configuration
document.chunking.default.strategy=recursive
document.chunking.default.chunk-size=300
document.preprocessing.mode=docling
document.preprocessing.docling.base-url=http://localhost:5001

# Docling picture description (VLM) for document ingestion
document.preprocessing.docling.vlm.do-picture-description=true
document.preprocessing.docling.vlm.url=https://api.openai.com/v1/chat/completions
document.preprocessing.docling.vlm.model=gpt-4o-mini
document.preprocessing.docling.vlm.api-key=${OPENAI_API_KEY:}

# For using Ollama (local)
# document.preprocessing.docling.vlm.url=http://localhost:11434/v1/chat/completions
# document.preprocessing.docling.vlm.model=qwen2.5vl:3b
# document.preprocessing.docling.vlm.api-key=

# UI Configuration
ui.font.zoom.default=100
