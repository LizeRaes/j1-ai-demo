<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company-wide Document Service</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="service-name-banner">Company-wide Document Service</div>
    <div class="zoom-controls">
        <button class="zoom-button" id="zoom-out" title="Zoom Out">−</button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="zoom-button" id="zoom-in" title="Zoom In">+</button>
    </div>
    <div class="container">
        <div class="left-pane" id="left-pane">
            <h2>
                <span class="toggle-arrow" id="toggle-arrow">◀</span>
                Activity Logs
            </h2>
            <div id="logs" class="logs-container"></div>
        </div>
        <button class="expand-button" id="expand-button" title="Show Activity Logs">▶</button>
        <div class="right-pane" id="right-pane">
            <div class="top-section">
                <h2>Document Chunks & Embeddings</h2>
                <div class="table-container chunks-container">
                    <table id="chunks-table">
                        <thead>
                            <tr>
                                <th>Document</th>
                                <th>Chunk #</th>
                                <th>Text</th>
                                <th>Vector (first 50 dims)</th>
                            </tr>
                        </thead>
                        <tbody id="chunks-body">
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="bottom-section">
                <h2>Company Documents</h2>
                <div class="upload-controls">
                    <input type="file" id="upload-file" />
                    <input type="text" id="upload-rbac" placeholder="RBAC teams (comma-separated, optional)" />
                    <button id="upload-button">Upload / Update</button>
                </div>
                <div class="table-container">
                    <table id="documents-table">
                        <thead>
                            <tr>
                                <th>Document Name</th>
                                <th>Type</th>
                                <th>RBAC Teams</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="documents-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
