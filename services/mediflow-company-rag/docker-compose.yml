version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"  # HTTP port (host:container) - changed from 6333 to avoid conflict
      - "6336:6334"  # gRPC port (host:container) - changed from 6334 to avoid conflict
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  qdrant_storage:
