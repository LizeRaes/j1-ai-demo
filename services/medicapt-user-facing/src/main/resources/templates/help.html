<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help / Support - MedicalAppointment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #5fa2ff 0%, #2f6fd1 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            margin-top: 50px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .help-form {
            margin-bottom: 30px;
        }
        .message-input-wrap {
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
            line-height: 1.5;
            min-height: 150px;
            resize: vertical;
            transition: border-color 0.3s;
            position: relative;
            z-index: 2;
            background: transparent;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .autocomplete-inline {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: auto;
            width: 100%;
            height: 100%;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: 6px;
            resize: none;
            font-size: 16px;
            font-family: inherit;
            color: #9ca3af;
            line-height: 1.5;
            background: transparent;
        }
        .autocomplete-hint {
            margin-top: 8px;
            color: #6b7280;
            font-size: 12px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 15px;
        }
        button:hover {
            background: #5568d3;
        }
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }
        a:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❓ Help / Support</h1>
        
        {#if submitted}
        <div class="message">
            Thank you! Your message has been submitted. We'll get back to you soon.
        </div>
        {/if}
        {#if error}
        <div class="message" style="background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">
            <strong>Error submitting your request:</strong><br>
            {error}
            <br><br>
            Please check the console logs for more details or try again.
        </div>
        {/if}
        
        <div class="help-form">
            <form method="POST" action="/help">
                <label for="message">How can we help?</label>
                <div class="message-input-wrap">
                    <textarea id="autocomplete-inline" class="autocomplete-inline" readonly tabindex="-1" aria-hidden="true"></textarea>
                    <textarea id="message" name="message" placeholder="Describe your issue or question here..." required></textarea>
                </div>
                <div class="autocomplete-hint">Press Enter to send. Use Shift+Enter for a newline.</div>
                <button type="submit">Send</button>
            </form>
        </div>
        
        <a href="/">Back to Home</a>
    </div>
    <script src="/js/help-autocomplete.js"></script>
</body>
</html>
