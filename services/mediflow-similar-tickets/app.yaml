kind: Service
apiVersion: v1
metadata:
  name: similar-tickets
  labels:
    app: similar-tickets
spec:
  type: ClusterIP
  selector:
    app: similar-tickets
  ports:
    - name: tcp
      port: 8080
      protocol: TCP
      targetPort: 8080
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: similar-tickets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: similar-tickets
  template:
    metadata:
      labels:
        app: similar-tickets
        version: v1
    spec:
      containers:
      - name: similar-tickets
        image: similar-tickets
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
