# HTTP
quarkus.http.port=8080

# Datasource
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=helpdesk
quarkus.datasource.password=ticketing
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/helpdesk?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# Pool sizing (demo-safe defaults)
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.acquisition-timeout=10S
# Hibernate
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

demo.dir.location=demo-data

# AI Triage Service
quarkus.rest-client.triage.uri=http://localhost:8081
# Coding Assistant Service
quarkus.rest-client.coding-assistant.uri=http://localhost:8085

app.coding-assistant.enabled=true
# Set this to your own target repository URL
app.coding-assistant.repo-url=https://github.com/LizeRaes/mediflow-user-facing
app.coding-assistant.confidence-threshold=0.60
app.coding-assistant.callback.auth-token=change-me

# Documents Service
quarkus.rest-client.documents.uri=http://localhost:8084
event.limit.max=200
