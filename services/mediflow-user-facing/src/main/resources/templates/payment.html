<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - MediFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            margin-top: 50px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .payment-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .payment-info p {
            margin-bottom: 10px;
            color: #555;
        }
        .payment-info .card-number {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            font-family: monospace;
        }
        form {
            margin-top: 20px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #218838;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Payment</h1>
        
        <div class="payment-info">
            <p><strong>Card Information:</strong></p>
            <p class="card-number">Visa **** 4242</p>
            <p>Exp: 12/28</p>
        </div>
        
        <form method="POST" action="/billing/pay">
            {#if appointmentId}
            <input type="hidden" name="appointmentId" value="{appointmentId}">
            {/if}
            <button type="submit">Confirm Payment</button>
        </form>
        
        <a href="/">Cancel</a>
    </div>
</body>
</html>
