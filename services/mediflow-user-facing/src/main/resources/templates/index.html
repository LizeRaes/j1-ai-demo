<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFlow - Medical Scheduling</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }
        .nav-button {
            display: block;
            padding: 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .nav-button.secondary {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 MediFlow</h1>
        <p class="subtitle">Medical Scheduling Made Simple</p>
        
        <div class="nav-grid">
            <a href="/appointments/book" class="nav-button">📅 Book Appointment</a>
            <a href="/appointments" class="nav-button">📋 My Appointments</a>
            <a href="/billing/pay" class="nav-button secondary">💳 Billing</a>
            <a href="/account" class="nav-button secondary">👤 Account</a>
            <a href="/help" class="nav-button">❓ Help / Support</a>
        </div>
    </div>
</body>
</html>
