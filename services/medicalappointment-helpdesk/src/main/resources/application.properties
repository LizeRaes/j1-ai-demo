# HTTP
quarkus.http.port=8080

# Datasource
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=ticketing
quarkus.datasource.password=ticketing
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/helpdesk?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Pool sizing (demo-safe defaults)
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.acquisition-timeout=10S

# Hibernate
quarkus.hibernate-orm.log.sql=false
# Note: database.generation is deprecated but still works in 3.30.8
# Use 'update' to preserve data on restart, or 'none' if you manage schema manually
quarkus.hibernate-orm.schema-management.strategy=update

# Static files (served from META-INF/resources)
quarkus.http.static-resources.index-page=index.html

# AI Triage Service
ai-triage.url=http://localhost:8081

# Ticket Similarity Service
similarity-service.url=http://localhost:8082

# Documents Service
company-rag.api=http://localhost:8084

# CORS (for development) - requires quarkus-cors extension
# quarkus.http.cors=true
# quarkus.http.cors.origins=*
